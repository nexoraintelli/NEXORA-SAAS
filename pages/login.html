<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nexora · Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main class="wrap" style="max-width:480px;min-height:100vh;display:flex;align-items:center;justify-content:center;">

    <section class="card" style="width:100%;padding:34px 28px;">
      <p style="font-family:Syne,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);font-size:11px;margin-bottom:12px;">
        Nexora Intelligence
      </p>

      <h1 style="font-size:34px;line-height:1.1;margin-bottom:10px;">
        Acesse sua plataforma
      </h1>

      <p style="color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:26px;">
        Entre para criar diagnósticos, consultar análises e acompanhar a evolução dos produtos.
      </p>

      <div style="margin-bottom:16px;">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div style="margin-bottom:20px;">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="Sua senha" autocomplete="current-password">
      </div>

      <button class="btn-primary" style="width:100%;margin-bottom:10px;" onclick="login()">
        Entrar
      </button>

      <button class="btn-secondary" style="width:100%;" onclick="signup()">
        Criar conta
      </button>

      <p id="msg" style="color:var(--muted);font-size:13px;margin-top:16px;line-height:1.5;"></p>

      <div style="margin-top:24px;padding-top:18px;border-top:1px solid var(--border);">
        <button class="btn-secondary" style="width:100%;" onclick="location.href='./index.html'">
          Voltar para início
        </button>
      </div>
    </section>

  </main>

  <script type="module">
    import { sb } from "../js/supabaseClient.js";

    const msg = document.getElementById("msg");

    async function checkSession() {
      const { data } = await sb.auth.getSession();

      if (data?.session) {
        window.location.href = "./dashboard.html";
      }
    }

    checkSession();

    function getFields() {
      return {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      };
    }

    function validateFields(email, password) {
      if (!email || !password) {
        msg.textContent = "Preencha e-mail e senha para continuar.";
        return false;
      }

      if (password.length < 6) {
        msg.textContent = "A senha precisa ter pelo menos 6 caracteres.";
        return false;
      }

      return true;
    }

    window.login = async function () {
      const { email, password } = getFields();

      if (!validateFields(email, password)) return;

      msg.textContent = "Entrando...";

      const { error } = await sb.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.textContent = "Não foi possível entrar. Verifique seu e-mail e senha.";
        return;
      }

      msg.textContent = "Login realizado com sucesso.";
      window.location.href = "./dashboard.html";
    };

    window.signup = async function () {
      const { email, password } = getFields();

      if (!validateFields(email, password)) return;

      msg.textContent = "Criando sua conta...";

      const { data, error } = await sb.auth.signUp({
        email,
        password
      });

      if (error) {
        msg.textContent = "Não foi possível criar sua conta. Verifique os dados e tente novamente.";
        return;
      }

      if (data?.user) {
        await sb.from("profiles").upsert({
          id: data.user.id,
          email: email,
          account_type: "consultor"
        });
      }

      msg.textContent = "Conta criada. Se necessário, confirme seu e-mail e depois faça login.";
    };
  </script>
</body>
</html>
