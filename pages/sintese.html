<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nexora · Product Health Score</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --nexora-red: #8b1e1e;
      --nexora-red-2: #b32626;
      --nexora-red-soft: rgba(139, 30, 30, 0.18);
    }

    body {
      background:
        radial-gradient(circle at 15% 20%, rgba(128,0,0,.45) 0%, transparent 30%),
        radial-gradient(circle at 75% 25%, rgba(111,29,29,.40) 0%, transparent 28%),
        radial-gradient(circle at 60% 80%, rgba(214,31,31,.22) 0%, transparent 22%),
        linear-gradient(135deg, #0b0b0c 0%, #121212 35%, #1a0000 100%);
    }

    .step-label {
      font-family: Syne, sans-serif;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-size: 11px;
      margin-bottom: 10px;
    }

    .context-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .metric-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
    }

    .metric-card p {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-card h3 {
      margin-top: 4px;
      line-height: 1.25;
    }

    .result-block {
      border: 1px solid var(--border);
      background: var(--surface-strong);
      border-radius: 16px;
      padding: 18px;
      margin-top: 16px;
    }

    .score-hero {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: center;
    }

    .score-number {
      font-family: Syne, sans-serif;
      font-size: 74px;
      line-height: 1;
      font-weight: 800;
    }

    .analysis-text {
      color: var(--text-muted);
      line-height: 1.85;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .pill-red {
      color: #fff;
      background: var(--nexora-red-soft);
      border: 1px solid rgba(179,38,38,.35);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      display: inline-flex;
    }

    .priority-card,
    .gap-card,
    .plan-card,
    .matrix-card {
      padding: 14px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
    }

    .priority-card strong,
    .gap-card strong,
    .plan-card strong,
    .matrix-card strong {
      display: block;
      margin-top: 4px;
    }

    .priority-card p,
    .gap-card p,
    .plan-card p,
    .matrix-card p {
      color: var(--muted);
      line-height: 1.65;
      margin-top: 6px;
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      border: 1px solid rgba(255,255,255,.12);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .tag-red {
      background: rgba(139,30,30,.18);
      border-color: rgba(179,38,38,.35);
      color: #fff;
    }

    .actions-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }



    .product-context-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(260px, .85fr);
      gap: 16px;
      align-items: stretch;
      margin-top: 18px;
    }

    .context-section {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.025);
      border-radius: 16px;
      padding: 16px;
    }

    .context-section h3 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .context-heading {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .context-focus {
      margin-top: 14px;
      padding: 16px;
      border: 1px solid rgba(179,38,38,.34);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(139,30,30,.18), rgba(255,255,255,.025));
    }

    .context-focus p {
      color: var(--muted);
      line-height: 1.65;
      margin-top: 8px;
      font-size: 13px;
    }

    .next-action-card {
      border-color: rgba(179,38,38,.42);
      background:
        radial-gradient(circle at top left, rgba(139,30,30,.24), transparent 28%),
        rgba(255,255,255,.035);
    }

    .next-action-card h3 {
      line-height: 1.35;
    }


    .systems-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .system-card {
      padding: 16px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      min-height: 170px;
    }

    .system-card.system-critical {
      border-color: rgba(179,38,38,.48);
      background: linear-gradient(135deg, rgba(139,30,30,.22), rgba(255,255,255,.025));
    }

    .system-card.system-warning {
      border-color: rgba(240,163,58,.36);
      background: linear-gradient(135deg, rgba(240,163,58,.10), rgba(255,255,255,.025));
    }

    .system-card.system-healthy {
      border-color: rgba(61,220,151,.26);
      background: linear-gradient(135deg, rgba(61,220,151,.08), rgba(255,255,255,.025));
    }

    .system-card h3 {
      font-size: 15px;
      line-height: 1.3;
      margin-top: 10px;
    }

    .system-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      margin-top: 8px;
    }

    .system-score {
      font-family: Syne, sans-serif;
      font-weight: 800;
      font-size: 30px;
      line-height: 1;
      margin-top: 12px;
    }

    .system-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .system-summary-card {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(179,38,38,.34);
      background: rgba(139,30,30,.12);
    }

    .system-summary-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 8px;
    }



    .insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .insight-card {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.025);
      border-radius: 14px;
      padding: 14px;
    }

    .insight-card h4 {
      font-family: Syne, sans-serif;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .insight-card p {
      color: var(--text-muted);
      line-height: 1.75;
      font-size: 13px;
      margin-top: 6px;
      white-space: pre-wrap;
    }

    .clean-note {
      border: 1px solid rgba(240,163,58,.28);
      background: rgba(240,163,58,.07);
      border-radius: 14px;
      padding: 12px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
      margin-top: 12px;
    }

    @media (max-width: 900px) {
      .context-grid,
      .score-grid,
      .score-hero,
      .product-context-hero,
      .systems-grid,
      .system-summary-grid,
      .insight-grid {
        grid-template-columns: 1fr;
      }

      .score-number {
        font-size: 58px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="card">
      <p class="step-label">Nexora Intelligence · Product Health Score</p>

      <h1>Síntese · Product Health Score</h1>

      <p style="color:var(--muted);margin-top:8px;line-height:1.7;">
        Cruzamento dos três cérebros: performance, página e mercado. A síntese identifica a causa raiz consolidada, a gravidade, os gaps principais e a ordem correta de ação.
      </p>
<div class="actions-row">
  <button class="btn-secondary" onclick="voltarParaProdutoOuDashboard()">
    Voltar ao produto
  </button>

  <button class="btn-secondary" onclick="irParaCerebro3()">
    Voltar ao Cérebro 3
  </button>

  <button class="btn-primary" onclick="gerarSintese()">
    Gerar Product Health Score com IA
  </button>

  <button class="btn-secondary" onclick="abrirRelatorio()">
    Ir para Relatório
  </button>
</div>
      <p id="msg" style="color:var(--muted);font-size:13px;margin-top:16px;"></p>
    </section>

    <section id="contextArea" class="card"></section>

    <section id="resultArea" class="card" style="display:none;"></section>

  </main>

  <script type="module">
import { requireAuth } from "../js/auth.js";
import { sb } from "../js/supabaseClient.js";
import { getDiagnosticId, saveBrainResult, updateDiagnostic } from "../js/diagnostics.js";
import { gerarSinteseFinal } from "../js/synthesisEngine.js";
import { analisarCincoSistemas } from "../js/nexoraSystemsEngine.js";
import { analisarSinteseComIA } from "../js/nexoraAI.js";
import { gerarAlertasNexora } from "../js/nexoraAlertsEngine.js";
import { gerarProximaMelhorAcaoNexora } from "../js/nexoraNextActionEngine.js";  

    await requireAuth();

const urlParams = new URLSearchParams(window.location.search);

const productIdFromUrl = urlParams.get("product_id");
const diagnosticIdFromUrl = urlParams.get("diagnostic_id");

if (productIdFromUrl) {
  localStorage.setItem("nx_product_id", productIdFromUrl);
}

if (diagnosticIdFromUrl) {
  localStorage.setItem("nx_diagnostic_id", diagnosticIdFromUrl);
}

const currentProductId =
  productIdFromUrl ||
  localStorage.getItem("nx_product_id");

const currentDiagnosticId =
  diagnosticIdFromUrl ||
  localStorage.getItem("nx_diagnostic_id");

const msg = document.getElementById("msg");
    const contextArea = document.getElementById("contextArea");
    const resultArea = document.getElementById("resultArea");

    let C1 = null;
let C2 = null;
let C3 = null;
let currentProduct = null;
let savedSynthFromDb = null;

await carregarContextoDoDiagnostico();

async function carregarContextoDoDiagnostico() {
  carregarContextoLocalStorage();

  if (currentProductId) {
    await carregarProdutoVinculado(currentProductId);
  }

  if (currentDiagnosticId) {
    await carregarBrainResultsDoSupabase(currentDiagnosticId);
  }
}

async function carregarProdutoVinculado(productId) {
  try {
    const { data, error } = await sb
      .from("products")
      .select("*")
      .eq("id", productId)
      .single();

    if (error || !data) {
      console.warn("Produto da síntese não encontrado:", error);
      return;
    }

    currentProduct = data;
    localStorage.setItem("nx_current_product", JSON.stringify(data));
  } catch (error) {
    console.warn("Não foi possível carregar o produto da síntese:", error);
  }
}

function carregarContextoLocalStorage() {
  try {
    C1 = JSON.parse(localStorage.getItem("nx_c1") || "null");
  } catch (e) {}

  try {
    C2 = JSON.parse(localStorage.getItem("nx_c2") || "null");
  } catch (e) {}

  try {
    C3 = JSON.parse(localStorage.getItem("nx_c3") || "null");
  } catch (e) {}
}
async function carregarBrainResultsDoSupabase(diagnosticId) {
  try {
    const { data, error } = await sb
      .from("brain_results")
      .select("*")
      .eq("diagnostic_id", diagnosticId);

    if (error) {
      console.warn("Erro ao carregar brain_results da síntese:", error);
      return;
    }

    const rows = data || [];

    const c1Row = rows.find(row => String(row.brain_code || "").toLowerCase() === "c1");
    const c2Row = rows.find(row => String(row.brain_code || "").toLowerCase() === "c2");
    const c3Row = rows.find(row => String(row.brain_code || "").toLowerCase() === "c3");
    const synthRow = rows.find(row => String(row.brain_code || "").toLowerCase() === "synth");

    if (c1Row?.result_data) {
      C1 = c1Row.result_data;
      localStorage.setItem("nx_c1", JSON.stringify(C1));
    }

    if (c2Row?.result_data) {
      C2 = c2Row.result_data;
      localStorage.setItem("nx_c2", JSON.stringify(C2));
    }

    if (c3Row?.result_data) {
      C3 = c3Row.result_data;
      localStorage.setItem("nx_c3", JSON.stringify(C3));
    }

    if (synthRow?.result_data) {
      savedSynthFromDb = synthRow.result_data;
      localStorage.setItem("nx_synth", JSON.stringify(savedSynthFromDb));
    }
  } catch (error) {
    console.warn("Não foi possível reconstruir contexto da síntese:", error);
  }
}

    function renderContext() {
      const productName = getProductName();
      const productAsin = currentProduct?.asin || C1?.product || "-";
      const category = currentProduct?.category || C1?.category || C1?.cat || "-";
      const subcategory = currentProduct?.subcategory || C1?.subcategory || C1?.sub || "-";
      const marketplace = currentProduct?.marketplace || "-";

      if (!C1 || !C2 || !C3) {
        contextArea.innerHTML = `
          <p class="step-label">Contexto obrigatório</p>
          <h2>Cérebros anteriores não encontrados</h2>

          <div class="product-context-hero">
            <div class="context-section">
              <h3>Produto em análise</h3>
              <div class="context-grid" style="grid-template-columns:repeat(2,1fr);">
                ${metricCard("Produto", productName)}
                ${metricCard("ASIN", productAsin)}
                ${metricCard("Categoria", category)}
                ${metricCard("Marketplace", marketplace)}
              </div>
            </div>

            <div class="context-focus">
              <span class="tag tag-red">Fluxo incompleto</span>
              <h3 style="margin-top:10px;">A Síntese precisa dos três cérebros</h3>
              <p>
                Para gerar a Síntese Final, execute primeiro o Cérebro 1, o Cérebro 2 e o Cérebro 3 dentro do mesmo diagnóstico.
              </p>
            </div>
          </div>

          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;">
           <button class="btn-secondary" onclick="irParaCerebro1()">
  Ir para Cérebro 1
</button>

<button class="btn-secondary" onclick="irParaCerebro2()">
  Ir para Cérebro 2
</button>

<button class="btn-primary" onclick="irParaCerebro3()">
  Ir para Cérebro 3
</button>
          </div>
        `;
        return;
      }

      contextArea.innerHTML = `
        <p class="step-label">Contexto recebido</p>
        <h2>Dados prontos para síntese</h2>

        <div class="product-context-hero">
          <div class="context-section">
            <h3>Produto em análise</h3>
            <div class="context-grid" style="grid-template-columns:repeat(2,1fr);">
              ${metricCard("Produto", productName)}
              ${metricCard("ASIN", productAsin)}
              ${metricCard("Categoria", category)}
              ${metricCard("Subcategoria", subcategory)}
              ${metricCard("Marketplace", marketplace)}
              ${metricCard("Diagnóstico", currentDiagnosticId ? "Vinculado" : "Sem ID")}
            </div>
          </div>

          <div class="context-focus">
            <span class="tag tag-red">Objetivo da Síntese</span>
            <h3 style="margin-top:10px;">Consolidar a causa raiz e definir a ordem correta de ação</h3>
            <p>
              A Síntese vai cruzar performance, página e mercado para identificar se o bloqueio principal está em atração, conversão, oferta, autoridade, diferenciação, mídia ou contexto competitivo.
            </p>
          </div>
        </div>

        <div class="context-heading">
          <div>
            <p class="step-label" style="margin-bottom:6px;">Resumo dos três cérebros</p>
            <h2 style="font-size:24px;">Base estratégica consolidada</h2>
          </div>
        </div>

        <div class="context-grid">
          ${smallCard("Cérebro 1 · Performance Score", `${C1.score_geral ?? "-"} / 100`, C1.root_cause || "Performance e métricas")}
          ${smallCard("Cérebro 2 · Listing Quality Score", `${C2.score_pagina ?? "-"} / 100`, C2.problema_principal || "Página e conversão")}
          ${smallCard("Cérebro 3 · Market Position Score", `${C3.score_mercado ?? "-"} / 100`, C3.dinamica_mercado || "Mercado e concorrência")}
        </div>

        <div class="score-grid">
          ${metricCard("CTR", formatPercent(C1.ctr))}
          ${metricCard("CVR", formatPercent(C1.cvr))}
          ${metricCard("ACOS", formatPercent(C1.acos))}
          ${metricCard("TACOS", formatPercent(C1.tacos))}
          ${metricCard("Causa raiz C1", C1.root_cause || "-")}
        </div>

        <div class="score-grid">
          ${metricCard("Problema C2", C2.problema_principal || "-")}
          ${metricCard("Gap C2", C2.gap_principal || "-")}
          ${metricCard("Mercado C3", C3.dinamica_mercado || "-")}
          ${metricCard("Problema C3", C3.problema_principal || "-")}
          ${metricCard("Recomendação C3", C3.recomendacao || "-")}
        </div>
      `;
    }

    renderContext();
    try {
  const savedSynth =
    savedSynthFromDb ||
    JSON.parse(localStorage.getItem("nx_synth") || "null");

  if (savedSynth) {
    renderResult(savedSynth);
    msg.textContent = savedSynthFromDb
      ? "Product Health Score carregado do histórico deste diagnóstico."
      : "Product Health Score já encontrado neste diagnóstico.";
  }
} catch (e) {}

    window.gerarSintese = async function () {
      if (!C1 || !C2 || !C3) {
        msg.textContent = "Execute os três cérebros antes de gerar a síntese.";
        return;
      }

     const diagnosticId = currentDiagnosticId || getDiagnosticId();

      if (!diagnosticId) {
        msg.textContent = "Nenhum diagnóstico ativo. Volte ao dashboard e inicie um novo diagnóstico.";
        return;
      }

      msg.textContent = "Gerando Product Health Score Nexora com IA...";

    const baseResult = gerarSinteseFinal(C1, C2, C3);
const systemsAnalysis = analisarCincoSistemas(C1, C2, C3);

const aiResult = await analisarSinteseComIA({
  c1: C1,
  c2: C2,
  c3: C3,
  systemsAnalysis,
  baseSynthesis: baseResult,
  product: currentProduct || {}
});
const result = aplicarIANexoraLayerSobreSintese(
  baseResult,
  aiResult,
  systemsAnalysis
);

const alerts = gerarAlertasNexora({
  c1: C1,
  c2: C2,
  c3: C3,
  systemsAnalysis,
  synthesis: result
});

const nextBestAction = gerarProximaMelhorAcaoNexora({
  c1: C1,
  c2: C2,
  c3: C3,
  systemsAnalysis,
  alerts,
  synthesis: result
});
      
const fullResult = {
  ...result,
  systems_analysis: systemsAnalysis,
  alerts,
  next_best_action: nextBestAction,
  nextBestAction,
  diagnostic_id: diagnosticId,
  product_id: currentProductId || null,
  source: {
    c1: C1,
    c2: C2,
    c3: C3
  },
  ts: new Date().toISOString()
};

      localStorage.setItem("nx_synth", JSON.stringify(fullResult));

      try {
        await updateDiagnostic(diagnosticId, {
  status: result.ia_usada ? "synthesis_ai_completed" : "synthesis_completed",
  product_id: currentProductId || null,
  final_score: result.score_final,
  root_cause: result.causa_raiz_consolidada || result.causa_raiz || null
});

        await saveBrainResult({
          diagnosticId,
          brainCode: "synth",
          brainName: "Síntese - Product Health Score",
          score: result.score_final,
          resultData: fullResult
        });

        renderResult(fullResult);
        msg.textContent = result.ia_usada
          ? "Product Health Score com IA salvo com sucesso."
          : "Product Health Score salvo com a engine Nexora. A IA não respondeu neste momento.";
      } catch (error) {
        console.error("Erro ao salvar Síntese Final:", error);
        renderResult(fullResult);
        msg.textContent = "A síntese foi gerada, mas não foi salva no banco. Veja o console.";
      }
    };
    async function gerarSinteseComIA(c1, c2, c3, baseResult) {
      const prompt = `
Você é a camada de IA estratégica da Nexora Intelligence, uma plataforma SaaS de diagnóstico sistêmico para produtos na Amazon.

A Nexora já rodou três cérebros antes desta síntese:
- Cérebro 1: performance, métricas, PPC, rentabilidade e operação;
- Cérebro 2: página, imagem, SEO, comunicação, confiança e oferta;
- Cérebro 3: mercado, concorrência, preço, barreira, diferenciação e quadrante competitivo.

A metodologia original da Nexora cruza os três cérebros em 5 sistemas proprietários:
- Unit Economics: crescimento com lucro, margem, ACOS, TACOS e sustentabilidade;
- Market Forces: força dominante da categoria, como preço, reviews, marca, diferenciação ou operação;
- Category Competition: preço relativo, reviews, barreira de entrada, quadrante e gap competitivo;
- Amazon Algorithm: relevância, atração, CTR, CVR, SEO, conversão e probabilidade de entrega;
- Operational Structure: FBA/FBM, Prime, Buy Box, estoque, logística e disponibilidade.

IMPORTANTE:
A engine Nexora já gerou uma síntese base. Sua função NÃO é substituir a engine. Sua função é consolidar, aprofundar e transformar os sinais dos três cérebros em uma leitura executiva final, consultiva e acionável.

REGRAS OBRIGATÓRIAS:
- Não invente dados.
- Não contradiga scores, causas raiz ou conclusões dos cérebros.
- Não use markdown.
- Não use quebras de linha dentro das strings.
- Não use aspas duplas dentro dos textos.
- Retorne SOMENTE JSON válido.
- Todas as strings precisam estar em uma única linha.
- Não seja genérico.
- Use no mínimo 1200 caracteres em diagnostico_executivo_aprofundado.
- Use no mínimo 600 caracteres em leitura_cruzada_aprofundada.
- Use exatamente 5 prioridades em prioridades_finais.
- Use exatamente 5 etapas em plano_acao.

CÉREBRO 1 COMPLETO:
${JSON.stringify(c1, null, 2)}

CÉREBRO 2 COMPLETO:
${JSON.stringify(c2, null, 2)}

CÉREBRO 3 COMPLETO:
${JSON.stringify(c3, null, 2)}

    async function chamarIANexora(payload) {
      const endpoints = [
        "/api/chat.js",
        "/api/chat",
        "../api/chat.js",
        "../api/chat"
      ];

      let lastError = null;

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            lastError = `${endpoint} retornou ${response.status}`;
            continue;
          }

          const data = await response.json().catch(() => null);

          if (!data) {
            lastError = `${endpoint} não retornou JSON válido`;
            continue;
          }

          const text =
            data.text ||
            data.content ||
            data.response ||
            data.reply ||
            data.message ||
            data.result ||
            data.output ||
            data?.choices?.[0]?.message?.content ||
            data?.content?.[0]?.text ||
            "";

          if (text) return text;

          lastError = `${endpoint} respondeu, mas sem texto reconhecido`;
        } catch (error) {
          lastError = error;
        }
      }

      console.warn("Nenhum endpoint de IA funcionou na Síntese:", lastError);
      return null;
    }

    function parseJsonSafe(raw) {
      if (!raw) return null;

      if (typeof raw === "object") {
        return raw;
      }

      let clean = String(raw)
        .replace(/```json/gi, "")
        .replace(/```/g, "")
        .trim();

      try {
        return JSON.parse(clean);
      } catch (e) {}

      const firstBrace = clean.indexOf("{");
      const lastBrace = clean.lastIndexOf("}");

      if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
        const jsonLike = clean.slice(firstBrace, lastBrace + 1);

        try {
          return JSON.parse(jsonLike);
        } catch (e) {
          console.warn("JSON da IA inválido na Síntese, usando fallback textual:", jsonLike, e);
        }
      }

      return {
        diagnostico_executivo_aprofundado: clean,
        leitura_cruzada_aprofundada: "A IA retornou uma leitura estratégica fora do formato estruturado esperado, mas o conteúdo foi preservado como complemento textual.",
        risco_de_nao_corrigir: "A leitura complementar reforça a necessidade de corrigir a causa raiz consolidada antes de escalar mídia, preço ou expansão.",
        decisao_estrategica: "Usar a análise base da Nexora como fonte principal e considerar a leitura da IA como complemento consultivo.",
        resumo_cliente: "A Nexora identificou uma causa raiz consolidada e recomenda priorizar as ações com maior impacto antes de escalar o produto.",
        prioridades_finais: [],
        plano_acao: []
      };
    }

    function limparTextoIA(texto) {
      const value = String(texto || "").trim();

      if (!value) return "";

      if (value.startsWith("{") || value.includes('"diagnostico_executivo_aprofundado"')) {
        try {
          const parsed = JSON.parse(value);
          return parsed.diagnostico_executivo_aprofundado || parsed.diagnostico_executivo || value;
        } catch (e) {
          return value
            .replace(/^\{/, "")
            .replace(/\}$/, "")
            .replace(/"diagnostico_executivo_aprofundado"\s*:\s*/g, "")
            .replace(/"leitura_cruzada_aprofundada"\s*:\s*/g, "")
            .replace(/"risco_de_nao_corrigir"\s*:\s*/g, "")
            .replace(/"decisao_estrategica"\s*:\s*/g, "")
            .replace(/^"/, "")
            .trim();
        }
      }

      return value;
    }

            ${(result.plano_acao || []).map((p) => `
              <div class="plan-card">
                <span class="tag">${escapeHtml(p.etapa || "Etapa")} · ${escapeHtml(p.prazo || "Prazo")}</span>

    function getProductName() {
      return (
        currentProduct?.product_name ||
        currentProduct?.name ||
        C1?.product_record?.product_name ||
        C1?.product ||
        "Produto em análise"
      );
    }

    function formatPercent(value) {
      if (value === undefined || value === null || value === "") return "-";
      const number = Number(value);
      if (!Number.isFinite(number)) return String(value);
      return `${String(number).replace(".", ",")}%`;
    }

    function getStrategicRisk(result) {
      const usableRisk = cleanDisplayText(result?.risco_ia || "");
      if (usableRisk && usableRisk.length > 140 && !isGenericRisk(usableRisk)) {
        return usableRisk;
      }

      const systemsAnalysis = result?.systems_analysis || {};
      const critical = systemsAnalysis?.mostCriticalSystem?.label || systemsAnalysis?.mostCriticalSystem?.name || "sistema principal";
      const secondary = systemsAnalysis?.secondarySystem?.label || systemsAnalysis?.secondarySystem?.name || "sistema secundário";
      const root = cleanDisplayText(result?.causa_raiz_consolidada || result?.causa_raiz || "a causa raiz consolidada");

      return `Se o bloqueio principal não for corrigido, o produto pode continuar recebendo tráfego sem transformar esse tráfego em vendas suficientes. A leitura dos 5 Sistemas indica atenção principal em ${critical}, com impacto secundário em ${secondary}. Na prática, isso pode gerar desperdício de mídia, pressão sobre margem, perda de competitividade e dificuldade de ganhar visibilidade orgânica, porque a Amazon tende a favorecer produtos com maior probabilidade de compra. A prioridade é corrigir ${root} antes de escalar investimento ou expansão.`;
    }

    function isGenericRisk(text) {
      const value = normalizeText(text);
      return (
        value.includes("necessidade de corrigir a causa raiz") && value.length < 220
      ) || (
        value.includes("antes de escalar midia") && value.length < 220
      );
    }

    function renderNextBestActionCard(result) {
  const action = normalizeNextBestAction(result.next_best_action || result.nextBestAction);

  return `
    <div class="result-block next-action-card">

      <div class="score-grid" style="grid-template-columns:repeat(2,minmax(0,1fr));margin-top:14px;">
        ${metricCard("Área prioritária", action.priority_area || "-")}
        ${metricCard("Prazo sugerido", action.timeframe || "-")}
      </div>

      <div class="gap-card" style="margin-top:14px;">
        <span class="tag tag-red">Por que essa ação vem primeiro</span>

}

function normalizeNextBestAction(action) {
  if (!action) {
    return {
      title: "Priorizar a causa raiz antes de escalar o produto",
      priority_area: "Estratégia",
      timeframe: "7 dias",
      reason: "A Nexora identificou que o produto precisa corrigir o bloqueio principal antes de aumentar mídia, preço ou expansão.",
      action: "Use a causa raiz consolidada, os alertas e os 5 Sistemas para corrigir o principal gargalo antes de ampliar investimento.",
      expected_result: "Evitar ações soltas e direcionar o seller para a primeira correção com maior impacto provável."
    };
  }

  if (typeof action === "string") {
    return {
      title: action,
      priority_area: "Estratégia",
      timeframe: "7 dias",
      reason: "A ação foi definida a partir da leitura consolidada da Nexora.",
      action,
      expected_result: "Direcionar o seller para o primeiro movimento com maior impacto provável."
    };
  }

  return {
  title:
    action.title ||
    action.titulo ||
    "Priorizar a causa raiz antes de escalar o produto",

  priority_area:
    action.priority_area ||
    action.area ||
    "Estratégia",

  timeframe:
    action.timeframe ||
    action.prazo ||
    "7 dias",

  reason:
    action.reason ||
    action.motivo ||
    action.detail ||
    action.detalhe ||
    "A ação foi definida a partir da leitura consolidada entre performance, página, mercado, alertas e 5 Sistemas Nexora.",

  action:
    action.action ||
    action.acao ||
    action.recommendation ||
    action.recomendacao ||
    action.o_que_fazer ||
    action.proxima_acao ||
    action.detail ||
    action.detalhe ||
    action.title ||
    "Executar a ação prioritária indicada pela Nexora antes de aumentar investimento, mídia ou expansão.",

  expected_result:
    action.expected_result ||
    action.resultado_esperado ||
    action.impacto ||
    "Melhorar a clareza da decisão, reduzir ações dispersas e atacar primeiro o bloqueio com maior impacto provável."
};
    function renderIAComplementar(result) {
      const cards = [];
      if (isUsableNarrative(result.diagnostico_ia)) {
        cards.push({ title: "Leitura executiva da IA", text: cleanDisplayText(result.diagnostico_ia) });
      }
      if (isUsableNarrative(result.leitura_cruzada_ia)) {
        cards.push({ title: "Leitura cruzada complementar", text: cleanDisplayText(result.leitura_cruzada_ia) });
      }
      if (!cards.length) return "";

      return `
        <div class="result-block" style="border-color:rgba(216,139,45,.24);">
          <h3>Complemento consultivo da IA Nexora</h3>
          <div class="insight-grid">
            ${cards.map(card => `
              <div class="insight-card">
                <h4>${escapeHtml(card.title)}</h4>
                <div style="margin-top:10px;">
  ${formatarTextoEmParagrafos(card.text)}
</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderInsightCards(title, rawText, labels = []) {
      const text = cleanDisplayText(rawText);
      if (!text) return "";

      const chunks = splitTextIntoCards(text, labels.length || 4);

      return `
        <div class="result-block">
          <h3>${escapeHtml(title)}</h3>
          <div class="insight-grid">
            ${chunks.map((chunk, index) => `
              <div class="insight-card">
                <h4>${escapeHtml(labels[index] || `Leitura ${index + 1}`)}</h4>
                <p>${escapeHtml(chunk)}</p>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function splitTextIntoCards(text, desiredChunks = 4) {
      const clean = cleanDisplayText(text);
      if (!clean) return [];

      const paragraphs = clean
        .split(/\n{2,}|(?<=\.)\s+(?=[A-ZÁÉÍÓÚÂÊÔÃÕÇ])/g)
        .map(p => p.trim())
        .filter(Boolean);

      const maxChunks = Math.max(2, Math.min(desiredChunks, 5));
      const chunks = Array.from({ length: maxChunks }, () => "");

      paragraphs.forEach((paragraph, index) => {
        const target = index % maxChunks;
        chunks[target] = [chunks[target], paragraph].filter(Boolean).join("\n\n");
      });

      return chunks.filter(Boolean);
    }

    function cleanDisplayText(value) {
      if (value === undefined || value === null) return "";

      if (typeof value === "object") {
        return cleanDisplayText(
          value.leitura_executiva ||
          value.diagnostico_executivo ||
          value.diagnostico_executivo_aprofundado ||
          value.resumo_executivo ||
          value.resumo_cliente ||
          value.text ||
          ""
        );
      }

      let text = String(value)
        .replace(/```json/gi, "")
        .replace(/```/g, "")
        .replace(/\\n/g, "\n")
        .trim();

      if (!text) return "";

      const parsed = tryParseJson(text);
      if (parsed) {
        return cleanDisplayText(
          parsed.diagnostico_executivo_aprofundado ||
          parsed.leitura_cruzada_aprofundada ||
          parsed.risco_de_nao_corrigir ||
          parsed.decisao_estrategica ||
          parsed.resumo_cliente ||
          parsed.diagnostico_executivo ||
          ""
        );
      }

      // Se veio um JSON quebrado, remove linhas técnicas e mantém apenas frases legíveis.
      if (looksLikeCodeOrJson(text)) {
        text = text
          .split(/\n+/)
          .map(line => line.trim())
          .filter(line => line && !isTechnicalLine(line))
          .join("\n")
          .trim();
      }

      return text
        .replace(/^"|"$/g, "")
        .replace(/,$/g, "")
        .replace(/\{\s*/g, "")
        .replace(/\}\s*/g, "")
        .replace(/\[\s*/g, "")
        .replace(/\]\s*/g, "")
        .replace(/\s{3,}/g, " ")
        .trim();
    }

    function isTechnicalLine(line) {
      const normalized = normalizeText(line);
      if (/^[\{\}\[\],]+$/.test(line)) return true;
      if (/^"?[a-zA-Z0-9_]+"?\s*:/.test(line)) return true;
      if (normalized.includes("diagnostico_executivo_aprofundado")) return true;
      if (normalized.includes("leitura_cruzada_aprofundada")) return true;
      if (normalized.includes("prioridades_finais")) return true;
      if (normalized.includes("plano_acao")) return true;
      if (normalized.includes("risco_de_nao_corrigir")) return true;
      if (normalized.includes("decisao_estrategica")) return true;
      if (normalized.includes("resumo_cliente")) return true;
      return false;
    }

    function looksLikeCodeOrJson(text) {
      const value = String(text || "");
      const signals = ["{", "}", "[", "]", '"diagnostico_', '"plano_acao"', '"prioridades_finais"', '"etapa"', '"titulo"'];
      return signals.filter(signal => value.includes(signal)).length >= 2;
    }

    function tryParseJson(text) {
      try {
        return JSON.parse(text);
      } catch (e) {}

      const first = text.indexOf("{");
      const last = text.lastIndexOf("}");
      if (first !== -1 && last !== -1 && last > first) {
        try {
          return JSON.parse(text.slice(first, last + 1));
        } catch (e) {}
      }

      return null;
    }

    function isUsableNarrative(value) {
      const text = cleanDisplayText(value);
      if (!text || text.length < 180) return false;
      if (looksLikeCodeOrJson(text)) return false;
      return true;
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function normalizarPrioridades(items = [], fallback = []) {
      const clean = items
        .filter(item => item && typeof item === "object")
        .map((item, index) => ({
          prioridade: cleanDisplayText(item.prioridade || String(index + 1)),
          area: cleanDisplayText(item.area || "Estratégia"),
          titulo: cleanDisplayText(item.titulo || item.acao || `Prioridade ${index + 1}`),
          detalhe: cleanDisplayText(item.detalhe || item.descricao || ""),
          impacto: cleanDisplayText(item.impacto || "")
        }))
        .filter(item => item.titulo || item.detalhe);

      return clean.length ? clean : fallback;
    }

    function normalizarPlanoAcao(items = [], fallback = []) {
      const clean = items
        .filter(item => item && typeof item === "object")
        .map((item, index) => ({
          etapa: cleanDisplayText(item.etapa || `Etapa ${index + 1}`),
          prazo: cleanDisplayText(item.prazo || ""),
          titulo: cleanDisplayText(item.titulo || item.acao || `Ação ${index + 1}`),
          descricao: cleanDisplayText(item.descricao || item.detalhe || ""),
          objetivo: cleanDisplayText(item.objetivo || item.impacto || "")
        }))
        .filter(item => item.titulo || item.descricao);

      return clean.length ? clean : fallback;
    }
function renderAlertsNexora(alerts = []) {
  if (!Array.isArray(alerts) || !alerts.length) {
    return "";
  }

  const criticalCount = alerts.filter(alert => alert.level === "Crítico").length;
  const warningCount = alerts.filter(alert => alert.level === "Atenção").length;

  return `
    <div class="result-block">
      <p class="step-label">Alertas estratégicos Nexora</p>
      <h3>Sinais que exigem atenção neste produto</h3>

      <p style="color:var(--muted);line-height:1.7;margin-top:8px;">
        Estes alertas foram gerados por regras da engine Nexora a partir dos dados dos três cérebros, dos benchmarks e dos 5 Sistemas. A IA pode explicar os sinais, mas não inventa os alertas.
      </p>

      <div class="score-grid" style="grid-template-columns:repeat(2,minmax(0,1fr));">
        ${metricCard("Alertas críticos", criticalCount)}
        ${metricCard("Alertas de atenção", warningCount)}
      </div>

      <div style="display:grid;gap:12px;margin-top:16px;">
        ${alerts.map(alert => alertCard(alert)).join("")}
      </div>
    </div>
  `;
}

function alertCard(alert) {
  const isCritical = alert.level === "Crítico";

  return `
    <div class="gap-card" style="${
      isCritical
        ? "border-color:rgba(179,38,38,.42);background:rgba(139,30,30,.14);"
        : "border-color:rgba(240,163,58,.30);background:rgba(240,163,58,.07);"
    }">
      <span class="tag ${isCritical ? "tag-red" : ""}">
        ${escapeHtml(alert.level || "Alerta")} · ${escapeHtml(alert.area || "Nexora")}
      </span>

      <strong>${escapeHtml(alert.title || "Alerta estratégico")}</strong>

      <p>
        <strong style="color:var(--text);display:inline;">Evidência:</strong>
        ${escapeHtml(alert.evidence || "-")}
      </p>

      <p>
        <strong style="color:var(--text);display:inline;">Impacto:</strong>
        ${escapeHtml(alert.impact || "-")}
      </p>

      <p>
        <strong style="color:var(--text);display:inline;">Ação recomendada:</strong>
        ${escapeHtml(alert.action || "-")}
      </p>
    </div>
  `;
}
    
    function renderSystemsAnalysis(systemsAnalysis) {
      if (!systemsAnalysis || !Array.isArray(systemsAnalysis.systemsList)) {
        return "";
      }

      const critical = systemsAnalysis.mostCriticalSystem || {};
      const secondary = systemsAnalysis.secondarySystem || {};

      return `
        <div class="result-block">
          <p class="step-label">Diagnóstico sistêmico Nexora</p>
          <h3>Os 5 sistemas que controlam este produto</h3>
          <p style="color:var(--muted);line-height:1.7;margin-top:8px;">
            Esta leitura reconecta os três cérebros à metodologia original da Nexora: não basta olhar métrica, é preciso entender qual sistema está travando a performance.
          </p>

          <div class="systems-grid">
            ${systemsAnalysis.systemsList.map(system => systemCard(system)).join("")}
          </div>

          <div class="system-summary-grid">
            <div class="system-summary-card">
              <span class="tag tag-red">Sistema mais crítico</span>
              <h3 style="margin-top:10px;">${escapeHtml(critical.label || critical.name || "-")}</h3>
              <p>${escapeHtml(critical.reason || "-")}</p>
            </div>

            <div class="system-summary-card">
              <span class="tag">Sistema secundário</span>
              <h3 style="margin-top:10px;">${escapeHtml(secondary.label || secondary.name || "-")}</h3>
              <p>${escapeHtml(secondary.reason || "-")}</p>
            </div>
          </div>

          <div class="context-focus" style="margin-top:14px;">
            <span class="tag tag-red">Leitura estratégica</span>
            <p>${escapeHtml(systemsAnalysis.strategicReading || "-")}</p>
          </div>
        </div>
      `;
    }

    function systemCard(system) {
      const className = getSystemCardClass(system.status);
      const evidences = Array.isArray(system.evidences) ? system.evidences.slice(0, 2) : [];

      return `
        <div class="system-card ${className}">
          <span class="tag ${system.status === "Crítico" ? "tag-red" : ""}">${escapeHtml(system.status || "-")}</span>
          <div class="system-score">${escapeHtml(system.score ?? "-")}</div>
          <h3>${escapeHtml(system.label || system.name || "-")}</h3>
          <p>${escapeHtml(system.reason || "-")}</p>
          ${evidences.length ? `
            <p style="color:var(--text-muted);font-size:11.5px;">
              Evidências: ${escapeHtml(evidences.join(" · "))}
            </p>
          ` : ""}
        </div>
      `;
    }

    function getSystemCardClass(status) {
      if (status === "Crítico") return "system-critical";
      if (status === "Atenção") return "system-warning";
      return "system-healthy";
    }

    function metricCard(title, value) {
      return `
        <div class="metric-card">
          <p>${escapeHtml(title)}</p>
          <h3>${escapeHtml(value)}</h3>
        </div>
      `;
    }

    function smallCard(title, value, detail) {
      return `
        <div class="metric-card">
          <p>${escapeHtml(title)}</p>
          <h3>${escapeHtml(value)}</h3>
          <p style="margin-top:8px;line-height:1.5;">${escapeHtml(detail)}</p>
        </div>
      `;
    }

    function scoreValue(result, key) {
      const value = result?.scores?.[key];

      if (value === undefined || value === null || Number.isNaN(value)) {
        return "-";
      }

      return value + "/100";
    }

function formatarTextoEmParagrafos(texto) {
  const clean = String(texto || "")
    .replace(/\\n/g, "\n")
    .replace(/\s+/g, " ")
    .trim();

  if (!clean) return "";

  const frases = clean.match(/[^.!?]+[.!?]+/g) || [clean];

  const paragrafos = [];
  let atual = "";

  frases.forEach((frase) => {
    const tentativa = `${atual} ${frase}`.trim();

    if (tentativa.length > 360 && atual) {
      paragrafos.push(atual.trim());
      atual = frase.trim();
    } else {
      atual = tentativa;
    }
  });

  if (atual) {
    paragrafos.push(atual.trim());
  }

  return paragrafos
    .map(paragrafo => `
      <p style="color:var(--text-muted);line-height:1.85;margin-top:12px;">
        ${escapeHtml(paragrafo)}
      </p>
    `)
    .join("");
}
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
