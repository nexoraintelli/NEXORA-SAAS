<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nexora · Síntese Final</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --nexora-red: #8b1e1e;
      --nexora-red-2: #b32626;
      --nexora-red-soft: rgba(139, 30, 30, 0.18);
    }

    body {
      background:
        radial-gradient(circle at 15% 20%, rgba(128,0,0,.45) 0%, transparent 30%),
        radial-gradient(circle at 75% 25%, rgba(111,29,29,.40) 0%, transparent 28%),
        radial-gradient(circle at 60% 80%, rgba(214,31,31,.22) 0%, transparent 22%),
        linear-gradient(135deg, #0b0b0c 0%, #121212 35%, #1a0000 100%);
    }

    .step-label {
      font-family: Syne, sans-serif;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-size: 11px;
      margin-bottom: 10px;
    }

    .context-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .metric-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
    }

    .metric-card p {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-card h3 {
      margin-top: 4px;
      line-height: 1.25;
    }

    .result-block {
      border: 1px solid var(--border);
      background: var(--surface-strong);
      border-radius: 16px;
      padding: 18px;
      margin-top: 16px;
    }

    .score-hero {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: center;
    }

    .score-number {
      font-family: Syne, sans-serif;
      font-size: 74px;
      line-height: 1;
      font-weight: 800;
    }

    .analysis-text {
      color: var(--text-muted);
      line-height: 1.85;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .pill-red {
      color: #fff;
      background: var(--nexora-red-soft);
      border: 1px solid rgba(179,38,38,.35);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      display: inline-flex;
    }

    .priority-card,
    .gap-card,
    .plan-card,
    .matrix-card {
      padding: 14px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
    }

    .priority-card strong,
    .gap-card strong,
    .plan-card strong,
    .matrix-card strong {
      display: block;
      margin-top: 4px;
    }

    .priority-card p,
    .gap-card p,
    .plan-card p,
    .matrix-card p {
      color: var(--muted);
      line-height: 1.65;
      margin-top: 6px;
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      border: 1px solid rgba(255,255,255,.12);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .tag-red {
      background: rgba(139,30,30,.18);
      border-color: rgba(179,38,38,.35);
      color: #fff;
    }

    .actions-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }



    .product-context-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(260px, .85fr);
      gap: 16px;
      align-items: stretch;
      margin-top: 18px;
    }

    .context-section {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.025);
      border-radius: 16px;
      padding: 16px;
    }

    .context-section h3 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .context-heading {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .context-focus {
      margin-top: 14px;
      padding: 16px;
      border: 1px solid rgba(179,38,38,.34);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(139,30,30,.18), rgba(255,255,255,.025));
    }

    .context-focus p {
      color: var(--muted);
      line-height: 1.65;
      margin-top: 8px;
      font-size: 13px;
    }

    .next-action-card {
      border-color: rgba(179,38,38,.42);
      background:
        radial-gradient(circle at top left, rgba(139,30,30,.24), transparent 28%),
        rgba(255,255,255,.035);
    }

    .next-action-card h3 {
      line-height: 1.35;
    }


    .systems-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .system-card {
      padding: 16px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      min-height: 170px;
    }

    .system-card.system-critical {
      border-color: rgba(179,38,38,.48);
      background: linear-gradient(135deg, rgba(139,30,30,.22), rgba(255,255,255,.025));
    }

    .system-card.system-warning {
      border-color: rgba(240,163,58,.36);
      background: linear-gradient(135deg, rgba(240,163,58,.10), rgba(255,255,255,.025));
    }

    .system-card.system-healthy {
      border-color: rgba(61,220,151,.26);
      background: linear-gradient(135deg, rgba(61,220,151,.08), rgba(255,255,255,.025));
    }

    .system-card h3 {
      font-size: 15px;
      line-height: 1.3;
      margin-top: 10px;
    }

    .system-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      margin-top: 8px;
    }

    .system-score {
      font-family: Syne, sans-serif;
      font-weight: 800;
      font-size: 30px;
      line-height: 1;
      margin-top: 12px;
    }

    .system-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .system-summary-card {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(179,38,38,.34);
      background: rgba(139,30,30,.12);
    }

    .system-summary-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .context-grid,
      .score-grid,
      .score-hero,
      .product-context-hero,
      .systems-grid,
      .system-summary-grid {
        grid-template-columns: 1fr;
      }

      .score-number {
        font-size: 58px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="card">
      <p class="step-label">Nexora Intelligence · Síntese Final</p>

      <h1>Síntese estratégica final</h1>

      <p style="color:var(--muted);margin-top:8px;line-height:1.7;">
        Cruzamento dos três cérebros: performance, página e mercado. A síntese identifica a causa raiz consolidada, a gravidade, os gaps principais e a ordem correta de ação.
      </p>
<div class="actions-row">
  <button class="btn-secondary" onclick="voltarParaProdutoOuDashboard()">
    Voltar ao produto
  </button>

  <button class="btn-secondary" onclick="irParaCerebro3()">
    Voltar ao Cérebro 3
  </button>

  <button class="btn-primary" onclick="gerarSintese()">
    Gerar Síntese Final com IA
  </button>

  <button class="btn-secondary" onclick="abrirRelatorio()">
    Ir para Relatório
  </button>
</div>
      <p id="msg" style="color:var(--muted);font-size:13px;margin-top:16px;"></p>
    </section>

    <section id="contextArea" class="card"></section>

    <section id="resultArea" class="card" style="display:none;"></section>

  </main>

  <script type="module">
    import { requireAuth } from "../js/auth.js";
import { sb } from "../js/supabaseClient.js";
import { getDiagnosticId, saveBrainResult, updateDiagnostic } from "../js/diagnostics.js";
import { gerarSinteseFinal } from "../js/synthesisEngine.js";
import { analisarCincoSistemas } from "../js/nexoraSystemsEngine.js";

    await requireAuth();

const urlParams = new URLSearchParams(window.location.search);

const productIdFromUrl = urlParams.get("product_id");
const diagnosticIdFromUrl = urlParams.get("diagnostic_id");

if (productIdFromUrl) {
  localStorage.setItem("nx_product_id", productIdFromUrl);
}

if (diagnosticIdFromUrl) {
  localStorage.setItem("nx_diagnostic_id", diagnosticIdFromUrl);
}

const currentProductId =
  productIdFromUrl ||
  localStorage.getItem("nx_product_id");

const currentDiagnosticId =
  diagnosticIdFromUrl ||
  localStorage.getItem("nx_diagnostic_id");

const msg = document.getElementById("msg");
    const contextArea = document.getElementById("contextArea");
    const resultArea = document.getElementById("resultArea");

    let C1 = null;
let C2 = null;
let C3 = null;
let currentProduct = null;
let savedSynthFromDb = null;

await carregarContextoDoDiagnostico();

async function carregarContextoDoDiagnostico() {
  carregarContextoLocalStorage();

  if (currentProductId) {
    await carregarProdutoVinculado(currentProductId);
  }

  if (currentDiagnosticId) {
    await carregarBrainResultsDoSupabase(currentDiagnosticId);
  }
}

async function carregarProdutoVinculado(productId) {
  try {
    const { data, error } = await sb
      .from("products")
      .select("*")
      .eq("id", productId)
      .single();

    if (error || !data) {
      console.warn("Produto da síntese não encontrado:", error);
      return;
    }

    currentProduct = data;
    localStorage.setItem("nx_current_product", JSON.stringify(data));
  } catch (error) {
    console.warn("Não foi possível carregar o produto da síntese:", error);
  }
}

function carregarContextoLocalStorage() {
  try {
    C1 = JSON.parse(localStorage.getItem("nx_c1") || "null");
  } catch (e) {}

  try {
    C2 = JSON.parse(localStorage.getItem("nx_c2") || "null");
  } catch (e) {}

  try {
    C3 = JSON.parse(localStorage.getItem("nx_c3") || "null");
  } catch (e) {}
}
async function carregarBrainResultsDoSupabase(diagnosticId) {
  try {
    const { data, error } = await sb
      .from("brain_results")
      .select("*")
      .eq("diagnostic_id", diagnosticId);

    if (error) {
      console.warn("Erro ao carregar brain_results da síntese:", error);
      return;
    }

    const rows = data || [];

    const c1Row = rows.find(row => String(row.brain_code || "").toLowerCase() === "c1");
    const c2Row = rows.find(row => String(row.brain_code || "").toLowerCase() === "c2");
    const c3Row = rows.find(row => String(row.brain_code || "").toLowerCase() === "c3");
    const synthRow = rows.find(row => String(row.brain_code || "").toLowerCase() === "synth");

    if (c1Row?.result_data) {
      C1 = c1Row.result_data;
      localStorage.setItem("nx_c1", JSON.stringify(C1));
    }

    if (c2Row?.result_data) {
      C2 = c2Row.result_data;
      localStorage.setItem("nx_c2", JSON.stringify(C2));
    }

    if (c3Row?.result_data) {
      C3 = c3Row.result_data;
      localStorage.setItem("nx_c3", JSON.stringify(C3));
    }

    if (synthRow?.result_data) {
      savedSynthFromDb = synthRow.result_data;
      localStorage.setItem("nx_synth", JSON.stringify(savedSynthFromDb));
    }
  } catch (error) {
    console.warn("Não foi possível reconstruir contexto da síntese:", error);
  }
}

    function renderContext() {
      const productName = getProductName();
      const productAsin = currentProduct?.asin || C1?.product || "-";
      const category = currentProduct?.category || C1?.category || C1?.cat || "-";
      const subcategory = currentProduct?.subcategory || C1?.subcategory || C1?.sub || "-";
      const marketplace = currentProduct?.marketplace || "-";

      if (!C1 || !C2 || !C3) {
        contextArea.innerHTML = `
          <p class="step-label">Contexto obrigatório</p>
          <h2>Cérebros anteriores não encontrados</h2>

          <div class="product-context-hero">
            <div class="context-section">
              <h3>Produto em análise</h3>
              <div class="context-grid" style="grid-template-columns:repeat(2,1fr);">
                ${metricCard("Produto", productName)}
                ${metricCard("ASIN", productAsin)}
                ${metricCard("Categoria", category)}
                ${metricCard("Marketplace", marketplace)}
              </div>
            </div>

            <div class="context-focus">
              <span class="tag tag-red">Fluxo incompleto</span>
              <h3 style="margin-top:10px;">A Síntese precisa dos três cérebros</h3>
              <p>
                Para gerar a Síntese Final, execute primeiro o Cérebro 1, o Cérebro 2 e o Cérebro 3 dentro do mesmo diagnóstico.
              </p>
            </div>
          </div>

          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;">
           <button class="btn-secondary" onclick="irParaCerebro1()">
  Ir para Cérebro 1
</button>

<button class="btn-secondary" onclick="irParaCerebro2()">
  Ir para Cérebro 2
</button>

<button class="btn-primary" onclick="irParaCerebro3()">
  Ir para Cérebro 3
</button>
          </div>
        `;
        return;
      }

      contextArea.innerHTML = `
        <p class="step-label">Contexto recebido</p>
        <h2>Dados prontos para síntese</h2>

        <div class="product-context-hero">
          <div class="context-section">
            <h3>Produto em análise</h3>
            <div class="context-grid" style="grid-template-columns:repeat(2,1fr);">
              ${metricCard("Produto", productName)}
              ${metricCard("ASIN", productAsin)}
              ${metricCard("Categoria", category)}
              ${metricCard("Subcategoria", subcategory)}
              ${metricCard("Marketplace", marketplace)}
              ${metricCard("Diagnóstico", currentDiagnosticId ? "Vinculado" : "Sem ID")}
            </div>
          </div>

          <div class="context-focus">
            <span class="tag tag-red">Objetivo da Síntese</span>
            <h3 style="margin-top:10px;">Consolidar a causa raiz e definir a ordem correta de ação</h3>
            <p>
              A Síntese vai cruzar performance, página e mercado para identificar se o bloqueio principal está em atração, conversão, oferta, autoridade, diferenciação, mídia ou contexto competitivo.
            </p>
          </div>
        </div>

        <div class="context-heading">
          <div>
            <p class="step-label" style="margin-bottom:6px;">Resumo dos três cérebros</p>
            <h2 style="font-size:24px;">Base estratégica consolidada</h2>
          </div>
        </div>

        <div class="context-grid">
          ${smallCard("Cérebro 1 · Performance", `${C1.score_geral ?? "-"} / 100`, C1.root_cause || "Performance e métricas")}
          ${smallCard("Cérebro 2 · Página", `${C2.score_pagina ?? "-"} / 100`, C2.problema_principal || "Página e conversão")}
          ${smallCard("Cérebro 3 · Mercado", `${C3.score_mercado ?? "-"} / 100`, C3.dinamica_mercado || "Mercado e concorrência")}
        </div>

        <div class="score-grid">
          ${metricCard("CTR", formatPercent(C1.ctr))}
          ${metricCard("CVR", formatPercent(C1.cvr))}
          ${metricCard("ACOS", formatPercent(C1.acos))}
          ${metricCard("TACOS", formatPercent(C1.tacos))}
          ${metricCard("Causa raiz C1", C1.root_cause || "-")}
        </div>

        <div class="score-grid">
          ${metricCard("Problema C2", C2.problema_principal || "-")}
          ${metricCard("Gap C2", C2.gap_principal || "-")}
          ${metricCard("Mercado C3", C3.dinamica_mercado || "-")}
          ${metricCard("Problema C3", C3.problema_principal || "-")}
          ${metricCard("Recomendação C3", C3.recomendacao || "-")}
        </div>
      `;
    }

    renderContext();
    try {
  const savedSynth =
    savedSynthFromDb ||
    JSON.parse(localStorage.getItem("nx_synth") || "null");

  if (savedSynth) {
    renderResult(savedSynth);
    msg.textContent = savedSynthFromDb
      ? "Síntese Final carregada do histórico deste diagnóstico."
      : "Síntese Final já encontrada neste diagnóstico.";
  }
} catch (e) {}

    window.gerarSintese = async function () {
      if (!C1 || !C2 || !C3) {
        msg.textContent = "Execute os três cérebros antes de gerar a síntese.";
        return;
      }

     const diagnosticId = currentDiagnosticId || getDiagnosticId();

      if (!diagnosticId) {
        msg.textContent = "Nenhum diagnóstico ativo. Volte ao dashboard e inicie um novo diagnóstico.";
        return;
      }

      msg.textContent = "Gerando Síntese Final Nexora com IA...";

      const systemsAnalysis = analisarCincoSistemas(C1, C2, C3);
      const baseResult = {
        ...gerarSinteseFinal(C1, C2, C3),
        systems_analysis: systemsAnalysis,
        next_best_action: systemsAnalysis.nextBestAction
      };
      const aiResult = await gerarSinteseComIA(C1, C2, C3, baseResult);
      const result = aplicarIASobreSintese(baseResult, aiResult);

     const fullResult = {
  ...result,
  systems_analysis: systemsAnalysis,
  next_best_action: result.next_best_action || systemsAnalysis.nextBestAction,
  diagnostic_id: diagnosticId,
  product_id: currentProductId || null,
  source: {
    c1: C1,
    c2: C2,
    c3: C3
  },
  ts: new Date().toISOString()
};

      localStorage.setItem("nx_synth", JSON.stringify(fullResult));

      try {
        await updateDiagnostic(diagnosticId, {
  status: result.ia_usada ? "synthesis_ai_completed" : "synthesis_completed",
  product_id: currentProductId || null,
  final_score: result.score_final,
  root_cause: result.causa_raiz_consolidada || result.causa_raiz || null
});

        await saveBrainResult({
          diagnosticId,
          brainCode: "synth",
          brainName: "Síntese Estratégica Final",
          score: result.score_final,
          resultData: fullResult
        });

        renderResult(fullResult);
        msg.textContent = result.ia_usada
          ? "Síntese Final com IA salva com sucesso."
          : "Síntese Final salva com a engine Nexora. A IA não respondeu neste momento.";
      } catch (error) {
        console.error("Erro ao salvar Síntese Final:", error);
        renderResult(fullResult);
        msg.textContent = "A síntese foi gerada, mas não foi salva no banco. Veja o console.";
      }
    };
    async function gerarSinteseComIA(c1, c2, c3, baseResult) {
      const prompt = `
Você é a camada de IA estratégica da Nexora Intelligence, uma plataforma SaaS de diagnóstico sistêmico para produtos na Amazon.

A Nexora já rodou três cérebros antes desta síntese:
- Cérebro 1: performance, métricas, PPC, rentabilidade e operação;
- Cérebro 2: página, imagem, SEO, comunicação, confiança e oferta;
- Cérebro 3: mercado, concorrência, preço, barreira, diferenciação e quadrante competitivo.

A metodologia original da Nexora cruza os três cérebros em 5 sistemas proprietários:
- Unit Economics: crescimento com lucro, margem, ACOS, TACOS e sustentabilidade;
- Market Forces: força dominante da categoria, como preço, reviews, marca, diferenciação ou operação;
- Category Competition: preço relativo, reviews, barreira de entrada, quadrante e gap competitivo;
- Amazon Algorithm: relevância, atração, CTR, CVR, SEO, conversão e probabilidade de entrega;
- Operational Structure: FBA/FBM, Prime, Buy Box, estoque, logística e disponibilidade.

IMPORTANTE:
A engine Nexora já gerou uma síntese base. Sua função NÃO é substituir a engine. Sua função é consolidar, aprofundar e transformar os sinais dos três cérebros em uma leitura executiva final, consultiva e acionável.

REGRAS OBRIGATÓRIAS:
- Não invente dados.
- Não contradiga scores, causas raiz ou conclusões dos cérebros.
- Não use markdown.
- Não use quebras de linha dentro das strings.
- Não use aspas duplas dentro dos textos.
- Retorne SOMENTE JSON válido.
- Todas as strings precisam estar em uma única linha.
- Não seja genérico.
- Use no mínimo 1200 caracteres em diagnostico_executivo_aprofundado.
- Use no mínimo 600 caracteres em leitura_cruzada_aprofundada.
- Use exatamente 5 prioridades em prioridades_finais.
- Use exatamente 5 etapas em plano_acao.

CÉREBRO 1 COMPLETO:
${JSON.stringify(c1, null, 2)}

CÉREBRO 2 COMPLETO:
${JSON.stringify(c2, null, 2)}

CÉREBRO 3 COMPLETO:
${JSON.stringify(c3, null, 2)}

SÍNTESE BASE DA ENGINE NEXORA:
${JSON.stringify(baseResult, null, 2)}

Retorne exatamente este JSON:

{
  "causa_raiz_consolidada": "causa raiz final em uma frase forte e estratégica",
  "gravidade": "Baixa, Média, Alta ou Crítica",
  "diagnostico_executivo_aprofundado": "texto executivo longo, consultivo e claro, conectando performance, página e mercado, explicando por que o produto está travado ou ainda não escala com segurança",
  "leitura_cruzada_aprofundada": "leitura integrada dos três cérebros, explicando como C1, C2 e C3 se reforçam, se contradizem ou se complementam",
  "risco_de_nao_corrigir": "risco comercial de seguir escalando ou operando sem corrigir a causa raiz consolidada",
  "decisao_estrategica": "decisão final recomendada para o seller ou consultor: corrigir página, ajustar mídia, reposicionar oferta, proteger margem, diferenciar mercado ou escalar com controle",
  "resumo_cliente": "resumo claro, elegante e vendável para cliente final, sem termos técnicos excessivos",
  "prioridades_finais": [
    {
      "prioridade": "1",
      "area": "área principal",
      "titulo": "ação prioritária 1",
      "detalhe": "explicação específica e prática",
      "impacto": "impacto esperado"
    },
    {
      "prioridade": "2",
      "area": "área principal",
      "titulo": "ação prioritária 2",
      "detalhe": "explicação específica e prática",
      "impacto": "impacto esperado"
    },
    {
      "prioridade": "3",
      "area": "área principal",
      "titulo": "ação prioritária 3",
      "detalhe": "explicação específica e prática",
      "impacto": "impacto esperado"

    async function chamarIANexora(payload) {
      const endpoints = [
        "/api/chat.js",
        "/api/chat",
        "../api/chat.js",
        "../api/chat"
      ];

      let lastError = null;

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            lastError = `${endpoint} retornou ${response.status}`;
            continue;
          }

          const data = await response.json().catch(() => null);

          if (!data) {
            lastError = `${endpoint} não retornou JSON válido`;
            continue;
          }

          const text =
            data.text ||
            data.content ||
            data.response ||
            data.reply ||
            data.message ||
            data.result ||
            data.output ||
            data?.choices?.[0]?.message?.content ||
            data?.content?.[0]?.text ||
            "";

          if (text) return text;

          lastError = `${endpoint} respondeu, mas sem texto reconhecido`;
        } catch (error) {
          lastError = error;
        }
      }

      console.warn("Nenhum endpoint de IA funcionou na Síntese:", lastError);
      return null;
    }

    function parseJsonSafe(raw) {
      if (!raw) return null;

      if (typeof raw === "object") {
        return raw;
      }

      let clean = String(raw)
        .replace(/```json/gi, "")
        .replace(/```/g, "")
        .trim();

      try {
        return JSON.parse(clean);
      } catch (e) {}

      const firstBrace = clean.indexOf("{");
      const lastBrace = clean.lastIndexOf("}");

      if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
        const jsonLike = clean.slice(firstBrace, lastBrace + 1);

        try {
          return JSON.parse(jsonLike);
        } catch (e) {
          console.warn("JSON da IA inválido na Síntese, usando fallback textual:", jsonLike, e);
        }
      }

      return {
        diagnostico_executivo_aprofundado: clean,
        leitura_cruzada_aprofundada: "A IA retornou uma leitura estratégica fora do formato estruturado esperado, mas o conteúdo foi preservado como complemento textual.",
        risco_de_nao_corrigir: "A leitura complementar reforça a necessidade de corrigir a causa raiz consolidada antes de escalar mídia, preço ou expansão.",
        decisao_estrategica: "Usar a análise base da Nexora como fonte principal e considerar a leitura da IA como complemento consultivo.",
        resumo_cliente: "A Nexora identificou uma causa raiz consolidada e recomenda priorizar as ações com maior impacto antes de escalar o produto.",
        prioridades_finais: [],
        plano_acao: []
      };
    }

          return value
            .replace(/^\{/, "")

            .replace(/"diagnostico_executivo_aprofundado"\s*:\s*/g, "")
            .replace(/"leitura_cruzada_aprofundada"\s*:\s*/g, "")

            .replace(/"decisao_estrategica"\s*:\s*/g, "")

  text = text
    .replace(/```json/gi, "")
    .replace(/```/g, "")
    .trim();

  if (text.startsWith("{") && text.endsWith("}")) {
    try {
      const parsed = JSON.parse(text);

      return (
        parsed.leitura_executiva ||
        parsed.diagnostico_executivo ||
        parsed.resumo_executivo ||

        parsed.recomendacao ||

        return "-";
      }

      return value + "/100";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
