<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nexora · Cérebro 1</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/global.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main class="wrap">

    <section class="card">
      <p style="font-family:Syne,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);font-size:11px;margin-bottom:12px;">
        Nexora Intelligence · Cérebro 1
      </p>

      <h1>Diagnóstico de métricas</h1>

      <p style="color:var(--muted);margin-top:8px;line-height:1.6;">
        Analise CTR, CVR, ACOS, TACOS e operação para identificar a primeira causa raiz do produto.
      </p>
    </section>

    <section class="card">
      <h2>Dados do produto</h2>

      <div style="display:grid;gap:16px;margin-top:20px;">
        <div>
          <label>Categoria</label>
          <input id="category" placeholder="Ex: Beleza, Suplementos, Casa">
        </div>

        <div>
          <label>Subcategoria</label>
          <input id="subcategory" placeholder="Ex: Vitamina C, Vela aromática, Shampoo">
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Métricas</h2>

      <div class="grid-3" style="margin-top:20px;">
        <div>
          <label>CTR (%)</label>
          <input id="ctr" type="number" step="0.01" placeholder="Ex: 0.45">
        </div>

        <div>
          <label>CVR (%)</label>
          <input id="cvr" type="number" step="0.01" placeholder="Ex: 8.5">
        </div>

        <div>
          <label>ACOS (%)</label>
          <input id="acos" type="number" step="0.01" placeholder="Ex: 32">
        </div>

        <div>
          <label>TACOS (%)</label>
          <input id="tacos" type="number" step="0.01" placeholder="Ex: 12">
        </div>

        <div>
          <label>BuyBox</label>
          <select id="buybox">
            <option value="">Selecione</option>
            <option>Tenho</option>
            <option>Disputada</option>
            <option>Não tenho</option>
          </select>
        </div>

        <div>
          <label>Estoque</label>
          <select id="stock">
            <option value="">Selecione</option>
            <option>Saudável</option>
            <option>Baixo</option>
            <option>Zerado</option>
          </select>
        </div>

        <div>
          <label>Fulfillment</label>
          <select id="fulfillment">
            <option value="">Selecione</option>
            <option>FBA</option>
            <option>FBM</option>
            <option>DBA</option>
          </select>
        </div>
      </div>

      <button class="btn-primary" style="margin-top:24px;width:100%;" onclick="gerarDiagnostico()">
        Gerar diagnóstico
      </button>

      <p id="msg" style="color:var(--muted);font-size:13px;margin-top:16px;"></p>
    </section>

    <section id="resultArea" class="card" style="display:none;"></section>

  </main>

  <script type="module">
    import { requireAuth } from "../js/auth.js";
    import { getDiagnosticId, saveBrainResult, updateDiagnostic } from "../js/diagnostics.js";
    import { gerarDiagnosticoBaseC1 } from "../js/cerebro1Engine.js";

    const user = await requireAuth();

    const msg = document.getElementById("msg");
    const resultArea = document.getElementById("resultArea");

    function n(id) {
      return Number(document.getElementById(id).value || 0);
    }

    function v(id) {
      return document.getElementById(id).value.trim();
    }

    function validar() {
      const required = [
        ["category", "categoria"],
        ["subcategory", "subcategoria"],
        ["ctr", "CTR"],
        ["cvr", "CVR"],
        ["acos", "ACOS"],
        ["tacos", "TACOS"],
        ["buybox", "BuyBox"],
        ["stock", "estoque"],
        ["fulfillment", "fulfillment"]
      ];

      for (const [id, label] of required) {
        if (!v(id)) {
          msg.textContent = `Preencha o campo: ${label}.`;
          return false;
        }
      }

      return true;
    }

    window.gerarDiagnostico = async function () {
      if (!validar()) return;

      const diagnosticId = getDiagnosticId();

      if (!diagnosticId) {
        msg.textContent = "Nenhum diagnóstico iniciado. Volte ao dashboard e clique em Novo diagnóstico.";
        return;
      }

      msg.textContent = "Gerando diagnóstico...";

      const data = {
        category: v("category"),
        subcategory: v("subcategory"),
        cat: v("category"),
        sub: v("subcategory"),
        ctr: n("ctr"),
        cvr: n("cvr"),
        acos: n("acos"),
        tacos: n("tacos"),
        buybox: v("buybox"),
        bb: v("buybox"),
        stock: v("stock"),
        est: v("stock"),
        fulfillment: v("fulfillment"),
        fba: v("fulfillment")
      };

      const benchmark = {
        ctr: 0.6,
        cvr: 10,
        acos: 25
      };

      const result = gerarDiagnosticoBaseC1(data, benchmark);

      const fullResult = {
        ...data,
        ...result,
        diagnostic_id: diagnosticId,
        benchmark,
        ts: new Date().toISOString()
      };

      localStorage.setItem("nx_c1", JSON.stringify(fullResult));

      await updateDiagnostic(diagnosticId, {
        status: "c1_completed",
        category: data.category,
        subcategory: data.subcategory,
        ctr: data.ctr,
        cvr: data.cvr,
        acos: data.acos,
        tacos: data.tacos,
        root_cause: result.root_cause
      });

      await saveBrainResult({
        diagnosticId,
        brainCode: "c1",
        brainName: "Cérebro 1 - Diagnóstico de Métricas",
        score: calcularScore(result.scores),
        resultData: fullResult
      });

      renderResult(fullResult);

      msg.textContent = "Diagnóstico salvo com sucesso.";
    };

    function calcularScore(scores) {
      let score = 100;

      if (scores.ctr === "CRÍTICO") score -= 20;
      else if (scores.ctr === "BAIXO") score -= 10;

      if (scores.cvr === "CRÍTICO") score -= 25;
      else if (scores.cvr === "BAIXO") score -= 12;

      if (scores.acos === "CRÍTICO") score -= 15;
      else if (scores.acos === "ATENÇÃO") score -= 8;

      if (scores.tacos === "ALTO") score -= 10;
      if (scores.ops === "CRÍTICO") score -= 25;
      else if (scores.ops === "ATENÇÃO") score -= 10;

      return Math.max(0, Math.min(100, score));
    }

    function renderResult(result) {
      resultArea.style.display = "block";

      resultArea.innerHTML = `
        <h2>Resultado do Cérebro 1</h2>

        <div style="margin-top:18px;padding:16px;border:1px solid var(--border);border-radius:14px;background:var(--surface-strong);">
          <p style="font-family:Syne,sans-serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);">
            Causa raiz provável
          </p>

          <h3 style="margin-top:8px;color:var(--text);">
            ${result.root_cause}
          </h3>

          <p style="color:var(--muted);margin-top:10px;line-height:1.6;">
            ${result.summary}
          </p>
        </div>

        <div class="grid-3" style="margin-top:18px;">
          ${metricCard("CTR", result.ctr + "%", result.scores.ctr)}
          ${metricCard("CVR", result.cvr + "%", result.scores.cvr)}
          ${metricCard("ACOS", result.acos + "%", result.scores.acos)}
          ${metricCard("TACOS", result.tacos + "%", result.scores.tacos)}
          ${metricCard("Operação", result.fulfillment, result.scores.ops)}
          ${metricCard("BuyBox", result.buybox, result.stock)}
        </div>

        <div style="margin-top:22px;">
          <h3>Prioridades</h3>

          <div style="display:grid;gap:10px;margin-top:12px;">
            ${result.priorities.map((p, i) => `
              <div style="padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.03);">
                <strong>${i + 1}. ${p}</strong>
              </div>
            `).join("")}
          </div>
        </div>

        <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn-secondary" onclick="location.href='./dashboard.html'">
            Voltar ao dashboard
          </button>

          <button class="btn-primary" onclick="location.href='./pagina.html'">
            Ir para Cérebro 2
          </button>
        </div>
      `;
    }

    function metricCard(title, value, status) {
      return `
        <div style="padding:14px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.03);">
          <p style="font-size:12px;color:var(--muted);">${title}</p>
          <h3 style="margin-top:4px;">${value}</h3>
          <p style="font-size:12px;color:var(--text-muted);margin-top:4px;">${status || "-"}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
