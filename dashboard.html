<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nexora · Login</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles/global.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><main class="wrap" style="max-width:440px"><section class="card"><h1>NEXORA</h1><p style="color:var(--muted);margin:8px 0 24px">Acesse sua área logada.</p><label for="email">E-mail</label><input id="email" type="email" autocomplete="email"><div style="height:14px"></div><label for="password">Senha</label><input id="password" type="password" autocomplete="current-password"><div style="height:18px"></div><button class="btn-primary" onclick="login()">Entrar</button><button class="btn-secondary" onclick="signup()" style="margin-left:8px">Criar conta</button><p id="msg" style="color:var(--muted);font-size:13px;margin-top:16px"></p></section></main><script type="module">import { sb } from "../js/supabaseClient.js";window.login=async function(){const email=document.getElementById("email").value.trim();const password=document.getElementById("password").value;const msg=document.getElementById("msg");if(!email||!password){msg.textContent="Preencha e-mail e senha.";return;}msg.textContent="Entrando...";const {error}=await sb.auth.signInWithPassword({email,password});if(error){msg.textContent="Não foi possível entrar. Verifique seus dados.";return;}window.location.href="./dashboard.html"};window.signup=async function(){const email=document.getElementById("email").value.trim();const password=document.getElementById("password").value;const msg=document.getElementById("msg");if(!email||!password){msg.textContent="Preencha e-mail e senha.";return;}const {data,error}=await sb.auth.signUp({email,password});if(error){msg.textContent="Não foi possível criar sua conta.";return;}if(data?.user){await sb.from("profiles").upsert({id:data.user.id,email,account_type:"consultor"});}msg.textContent="Conta criada. Agora faça login."}</script></body></html>
